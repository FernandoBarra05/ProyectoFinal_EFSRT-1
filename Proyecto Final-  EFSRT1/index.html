<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvManager - Gestión de Inventario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar Navigation -->
        <aside>
            <div class="logo">
                <h2>📦 InvManager</h2>
            </div>
            <nav>
                <ul>
                    <li><a href="#" class="nav-link active" data-view="dashboard">🏠 <span>Dashboard</span></a></li>
                    <li><a href="#" class="nav-link" data-view="products">🍎 <span>Productos</span></a></li>
                    <li><a href="#" class="nav-link" data-view="movements">🔄 <span>Movimientos</span></a></li>
                    <li><a href="#" class="nav-link" data-view="alerts">⚠️ <span>Alertas</span></a></li>
                    <li><a href="#" class="nav-link" data-view="reports">📊 <span>Reportes</span></a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main>
            <header>
                <h1 id="view-title">Dashboard Principal</h1>
                <div class="user-info">
                    <span id="current-date"></span> | 👤 Admin
                </div>
            </header>

            <!-- Dynamic Content Area -->
            <div id="content">
                <!-- Content will be injected here by app.js -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <!-- Product Modal -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Nuevo Producto</h2>
            <form id="product-form">
                <input type="hidden" id="prod-id">
                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" id="prod-name" required>
                </div>
                <div class="form-group">
                    <label>Categoría:</label>
                    <select id="prod-category" required>
                        <option value="Abarrotes">Abarrotes</option>
                        <option value="Ferretería">Ferretería</option>
                        <option value="Librería">Librería</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Precio Unitario (S/):</label>
                    <input type="number" id="prod-price" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label>Stock Inicial:</label>
                    <input type="number" id="prod-stock" min="0" required>
                </div>
                <div class="form-group">
                    <label>Stock Mínimo:</label>
                    <input type="number" id="prod-min-stock" min="0" required>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn" onclick="UI.closeModal('product-modal')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Movement Modal -->
    <div id="movement-modal" class="modal">
        <div class="modal-content">
            <h2>Registrar Movimiento</h2>
            <form id="movement-form">
                <div class="form-group">
                    <label>Producto:</label>
                    <select id="mov-product" required></select>
                </div>
                <div class="form-group">
                    <label>Tipo de Movimiento:</label>
                    <select id="mov-type" required>
                        <option value="entrada">Entrada (+)</option>
                        <option value="salida">Salida (-)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Cantidad:</label>
                    <input type="number" id="mov-quantity" min="1" required>
                </div>
                <div class="form-group">
                    <label>Responsable:</label>
                    <input type="text" id="mov-person" required>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn" onclick="UI.closeModal('movement-modal')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Registrar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
